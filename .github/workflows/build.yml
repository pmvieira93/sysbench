name: Build & Release (Nuitka)

on:
  push:
    tags:
      - "v*"          # Dispara em: git tag v1.0 && git push --tags

permissions:
  contents: write

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # LINUX — container manylinux_2_28 (glibc 2.28)
  #
  # Porquê manylinux_2_28 e não manylinux2014 (glibc 2.17)?
  # O GitHub Actions usa Node.js 20 internamente para correr os próprios steps
  # (checkout, upload-artifact, etc.), e o Node 20 requer glibc >= 2.28.
  # O manylinux2014 tem apenas glibc 2.17 → Node 20 falha antes do build começar.
  #
  # O manylinux_2_28 ainda cobre: Ubuntu 20.04+, Debian 10+, RHEL 8+,
  # Fedora 29+, Pop!_OS 20.04+ — mais do que suficiente para uso geral.
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64   # glibc 2.28

    steps:
      - uses: actions/checkout@v4

      # O container expõe Python 3.11 em /opt/python/cp311-cp311/bin/
      - name: Setup Python path
        run: echo "/opt/python/cp311-cp311/bin" >> $GITHUB_PATH

      - name: Install system deps
        run: dnf install -y patchelf ccache

      # O Nuitka em --onefile no manylinux precisa da libpython estática.
      # Está comprimida por defeito e tem de ser extraída antes do build.
      - name: Extract static libpython
        run: cd /opt/_internal && tar xf static-libs-for-embedding-only.tar.xz

      - name: Install Python deps
        run: pip3.11 install psutil rich nuitka ordered-set zstandard

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ hashFiles('benchmark.py') }}
          restore-keys: ccache-linux-

      - name: Build
        run: |
          python3.11 -m nuitka \
            --onefile \
            --output-filename=sysbench.bin \
            --assume-yes-for-downloads \
            --include-package=rich \
            --include-package-data=rich \
            --include-package=psutil \
            --nofollow-import-to=tkinter \
            benchmark.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysbench-linux
          path: sysbench.bin
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # WINDOWS — self-contained .exe (Python runtime + MSVC embutidos)
  # Corre em Windows 10+ sem Python instalado.
  # Nota: ccache não existe como pacote pip no Windows. O cache é feito pela
  # action Chocobo1/setup-ccache-action que suporta MSVC nativamente.
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install psutil rich nuitka ordered-set zstandard

      # Configura ccache para MSVC — reduz rebuilds de ~14min para ~3min
      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          windows_compile_environment: msvc

      - name: Build
        run: |
          python -m nuitka `
            --onefile `
            --output-filename=sysbench.exe `
            --assume-yes-for-downloads `
            --include-package=rich `
            --include-package-data=rich `
            --include-package=psutil `
            --nofollow-import-to=tkinter `
            --windows-console-mode=attach `
            benchmark.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysbench-windows
          path: sysbench.exe
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # MACOS — compila para a arquitectura nativa do runner
  #
  # Porquê sem --macos-target-arch?
  # O pip instala binários nativos (.so/.dylib) para a arquitectura do runner.
  # Se o runner é arm64 (Apple Silicon) e forçamos x86_64, o Nuitka falha porque
  # não consegue linkar um .so arm64 num binário x86_64.
  # A solução correcta é compilar para a arquitectura nativa e deixar o Rosetta
  # tratar da compatibilidade Intel se necessário.
  #
  # macos-latest = Apple Silicon (arm64) → corre nativamente em M1/M2/M3
  # macos-13     = Intel x86_64          → corre nativamente em Intel Mac
  # ════════════════════════════════════════════════════════════════════════════
  build-macos-arm64:
    runs-on: macos-latest   # arm64 — Apple Silicon nativo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: brew install ccache

      - name: Install Python deps
        run: pip install psutil rich nuitka ordered-set zstandard

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-macos-arm64-${{ hashFiles('benchmark.py') }}
          restore-keys: ccache-macos-arm64-

      - name: Build
        run: |
          python -m nuitka \
            --onefile \
            --output-filename=sysbench-arm64.bin \
            --assume-yes-for-downloads \
            --include-package=rich \
            --include-package-data=rich \
            --include-package=psutil \
            --nofollow-import-to=tkinter \
            benchmark.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysbench-macos-arm64
          path: sysbench-arm64.bin
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # RELEASE
  # ════════════════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Rename and mark executable
        run: |
          VERSION=${{ github.ref_name }}
          mv dist/sysbench-linux/sysbench.bin             dist/sysbench-${VERSION}-linux-amd64
          mv dist/sysbench-windows/sysbench.exe           dist/sysbench-${VERSION}-windows-amd64.exe
          cp dist/sysbench-macos-arm64/sysbench-arm64.bin dist/sysbench-${VERSION}-macos-arm64
          chmod +x dist/sysbench-${VERSION}-linux-amd64 dist/sysbench-${VERSION}-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SysBench ${{ github.ref_name }}"
          body: |
            ## SysBench ${{ github.ref_name }}

            Binários **self-contained** — não precisam de Python instalado.

            | Plataforma | Ficheiro | Requisitos |
            |---|---|---|
            | Linux x86_64 | `sysbench-${{ github.ref_name }}-linux-amd64` | glibc 2.28+ (Ubuntu 20.04+, Pop!_OS 20.04+, RHEL 8+) |
            | Windows x86_64 | `sysbench-${{ github.ref_name }}-windows-amd64.exe` | Windows 10+ |
            | macOS Apple Silicon | `sysbench-${{ github.ref_name }}-macos-arm64` | macOS 11+ M1/M2/M3 |

            **Linux / macOS:**
            ```bash
            chmod +x sysbench-${{ github.ref_name }}-*
            ./sysbench-${{ github.ref_name }}-linux-amd64
            ```
            **Windows:** executar directamente o `.exe`
          files: |
            dist/sysbench-${{ github.ref_name }}-linux-amd64
            dist/sysbench-${{ github.ref_name }}-windows-amd64.exe
            dist/sysbench-${{ github.ref_name }}-macos-arm64
          draft: false
          prerelease: false